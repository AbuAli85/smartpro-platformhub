# Notifies a Cursor Automation (webhook trigger) when an issue is ready for cloud agents.
# Cursor's built-in GitHub triggers do not include "issue labeled"; this workflow bridges
# GitHub (source of truth) → Cursor webhook → cloud agent run.
#
# Repository secrets (Settings → Secrets → Actions):
#   CURSOR_AUTOMATION_WEBHOOK_URL — from the automation's Webhook trigger after save
#   CURSOR_AUTOMATION_WEBHOOK_KEY — optional; credential value only (not the header name)
#
# Optional repository Variables (Settings → Secrets and variables → Actions → Variables).
# Only if Cursor auth is not default Authorization: Bearer:
#   CURSOR_AUTOMATION_WEBHOOK_AUTH_HEADER_NAME — e.g. X-API-Key (omit for Bearer).
#   CURSOR_AUTOMATION_WEBHOOK_AUTH_HEADER_PREFIX — only with HEADER_NAME=Authorization; default Bearer.
# Creating these names (values can be empty) silences VS Code “invalid context” hints for optional vars.
#
# If secrets are missing, the job skips without failing (labels/CI still work).
#
# Re-running a failed job from an OLD run reuses that run’s commit (you will still see legacy
# curl -f / exit 22). Use “Run workflow” (workflow_dispatch) or a new issue/label on latest main.

name: Cursor ready-for-AI webhook

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to send in the webhook body (manual test from latest main)
        required: true
        type: string
  issues:
    types: [opened, labeled]

jobs:
  notify-cursor:
    permissions:
      contents: read
      issues: read
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' && github.event.label.name == 'ai-state:ready-for-ai') ||
      (github.event.action == 'opened' && contains(join(github.event.issue.labels.*.name, ','), 'ai-state:ready-for-ai'))
    steps:
      - name: POST webhook payload
        env:
          GH_API_TOKEN: ${{ github.token }}
          WEBHOOK_URL: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_KEY }}
          # github/vscode-github-actions#222 — extension may warn until vars exist; runtime treats missing vars as empty.
          AUTH_HEADER_NAME: ${{ vars.CURSOR_AUTOMATION_WEBHOOK_AUTH_HEADER_NAME }}
          AUTH_HEADER_PREFIX: ${{ vars.CURSOR_AUTOMATION_WEBHOOK_AUTH_HEADER_PREFIX }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "CURSOR_AUTOMATION_WEBHOOK_URL not configured; skipping Cursor notification."
            exit 0
          fi

          # Trim secrets (paste errors); strip accidental "Bearer " if the whole line was saved as the secret.
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          WEBHOOK_URL="$(trim "${WEBHOOK_URL}")"
          WEBHOOK_KEY="$(trim "${WEBHOOK_KEY}")"
          if [ -n "${WEBHOOK_KEY}" ] && [[ "${WEBHOOK_KEY}" =~ ^[Bb][Ee][Aa][Rr][Ee][Rr][[:space:]]+(.+)$ ]]; then
            WEBHOOK_KEY="$(trim "${BASH_REMATCH[1]}")"
          fi

          export WEBHOOK_ISSUE_JSON_FILE=""
          export WEBHOOK_GITHUB_EVENT_LABEL=""
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
            # Do not use curl -f here: GitHub API 401/403/404 would become exit 22 and look like a Cursor failure.
            gh_code="$(curl -sS -o issue-for-webhook.json -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUM}")"
            if [ "${gh_code}" != "200" ]; then
              echo "GitHub REST API failed (HTTP ${gh_code}) while loading issue #${ISSUE_NUM} for workflow_dispatch."
              echo "This is not the Cursor webhook yet — fix repo permissions (job needs issues: read) or the issue number."
              if [ -s issue-for-webhook.json ]; then
                head -c 800 issue-for-webhook.json | tr -d '\r' || true
                echo
              fi
              exit 1
            fi
            export WEBHOOK_ISSUE_JSON_FILE=issue-for-webhook.json
            export WEBHOOK_GITHUB_EVENT_LABEL=workflow_dispatch
          fi

          node <<'NODE'
          const fs = require("fs");
          const fromFile = process.env.WEBHOOK_ISSUE_JSON_FILE;
          let issue;
          let github_event;
          if (fromFile) {
            issue = JSON.parse(fs.readFileSync(fromFile, "utf8"));
            github_event = process.env.WEBHOOK_GITHUB_EVENT_LABEL || "workflow_dispatch";
          } else {
            const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
            issue = event.issue;
            github_event = `issues.${event.action}`;
          }
          const maxBodyChars = 100000;
          let body = issue.body == null ? "" : String(issue.body);
          const bodyTruncated = body.length > maxBodyChars;
          if (bodyTruncated) {
            body =
              body.slice(0, maxBodyChars) +
              "\n\n[truncated by smartpro-platformhub webhook: issue body exceeded " +
              maxBodyChars +
              " characters]";
          }
          const payload = {
            source: "github-actions",
            repository: process.env.GITHUB_REPOSITORY,
            github_event,
            issue: {
              number: issue.number,
              title: issue.title,
              html_url: issue.html_url,
              body,
              body_truncated: bodyTruncated,
              labels: (issue.labels || []).map((l) => (typeof l === "string" ? l : l.name)),
            },
          };
          fs.writeFileSync("payload.json", JSON.stringify(payload));
          NODE

          CURL_ARGS=(-sS -X POST "$WEBHOOK_URL" -H "Content-Type: application/json; charset=utf-8" -H "Accept: application/json" --data-binary @payload.json)
          if [ -n "${WEBHOOK_KEY}" ]; then
            if [ -z "${AUTH_HEADER_NAME}" ]; then
              CURL_ARGS+=(-H "Authorization: Bearer ${WEBHOOK_KEY}")
            elif [ "${AUTH_HEADER_NAME}" = "Authorization" ]; then
              prefix="${AUTH_HEADER_PREFIX:-Bearer }"
              CURL_ARGS+=(-H "Authorization: ${prefix}${WEBHOOK_KEY}")
            else
              CURL_ARGS+=(-H "${AUTH_HEADER_NAME}: ${WEBHOOK_KEY}")
            fi
          else
            echo "::warning::CURSOR_AUTOMATION_WEBHOOK_KEY is empty. Authenticated Cursor webhooks will return 401 until you add the token from Generate auth header (value only, not the word Bearer)."
          fi

          http_code="$(curl -sS -o /tmp/cursor_webhook_resp.txt -w "%{http_code}" "${CURL_ARGS[@]}")"
          if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
            echo "Cursor webhook accepted (HTTP ${http_code})."
            exit 0
          fi
          echo "Cursor webhook failed with HTTP ${http_code}."
          if [ "${http_code}" = "401" ]; then
            echo "401 usually means: wrong or revoked token, token included Bearer twice, or URL is for a different automation. In GitHub, set CURSOR_AUTOMATION_WEBHOOK_KEY to the exact token after Bearer from Cursor only. Regenerate in Cursor if unsure."
          fi
          if [ "${http_code}" = "400" ]; then
            echo "400 from Cursor: read the JSON below. It may be invalid payload/URL, or Cursor refusing to start an agent (failed_precondition / background composer = often concurrent-agent limit, billing, or automation env — fix in Cursor dashboard, not in this workflow)."
          fi
          if [ -s /tmp/cursor_webhook_resp.txt ]; then
            head -c 800 /tmp/cursor_webhook_resp.txt | tr -d '\r' || true
            echo
            if grep -qE 'failed_precondition|background composer|Concurrent agent' /tmp/cursor_webhook_resp.txt 2>/dev/null; then
              echo "::notice::Cursor failed_precondition / background composer: free agent slots, cancel stuck runs, or upgrade plan; GitHub payload delivery is working."
            fi
          fi
          exit 1
